<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Đăng Ký</title>

<style>

body{
    font-family: Arial;
    margin:40px;
}

form{
    width:400px;
}

.field{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:4px;
}

.error{
    color:red;
    font-size:13px;
    display:none;
}

input.error-border{
    border:2px solid red;
}

input.success-border{
    border:2px solid green;
}

.success-message{
    font-size:20px;
    color:green;
}

</style>

</head>

<body>

<h2>Đăng ký tài khoản</h2>

<form id="registerForm">

<div class="field">
<label>Họ và tên</label>
<input id="fullname">
<span class="error" id="fullnameError"></span>
</div>

<div class="field">
<label>Email</label>
<input id="email">
<span class="error" id="emailError"></span>
</div>

<div class="field">
<label>Số điện thoại</label>
<input id="phone">
<span class="error" id="phoneError"></span>
</div>

<div class="field">
<label>Mật khẩu</label>
<input type="password" id="password">
<span class="error" id="passwordError"></span>
</div>

<div class="field">
<label>Xác nhận mật khẩu</label>
<input type="password" id="confirmPassword">
<span class="error" id="confirmPasswordError"></span>
</div>

<div class="field">

<label>Giới tính</label><br>

<input type="radio" name="gender" value="Nam"> Nam
<input type="radio" name="gender" value="Nữ"> Nữ

<br>
<span class="error" id="genderError"></span>

</div>

<div class="field">

<label>
<input type="checkbox" id="terms">
Tôi đồng ý với điều khoản
</label>

<br>
<span class="error" id="termsError"></span>

</div>

<button type="submit">Đăng ký</button>

</form>

<div id="successBox"></div>

<script>

const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
const phoneRegex = /^0[0-9]{9}$/
const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/
const nameRegex = /^[a-zA-ZÀ-ỹ\s]+$/

function showError(field,message){

    const input = document.getElementById(field)
    const error = document.getElementById(field+"Error")

    error.innerText = message
    error.style.display = "block"

    if(input){
        input.classList.add("error-border")
        input.classList.remove("success-border")
    }

}

function clearError(field){

    const input = document.getElementById(field)
    const error = document.getElementById(field+"Error")

    if(error){
        error.style.display = "none"
    }

    if(input){
        input.classList.remove("error-border")
        input.classList.add("success-border")
    }

}

function validateFullname(){

    const value = document.getElementById("fullname").value.trim()

    if(value === ""){
        showError("fullname","Không được để trống")
        return false
    }

    if(value.length < 3){
        showError("fullname","Phải ≥ 3 ký tự")
        return false
    }

    if(!nameRegex.test(value)){
        showError("fullname","Chỉ chứa chữ cái")
        return false
    }

    clearError("fullname")
    return true

}

function validateEmail(){

    const value = document.getElementById("email").value.trim()

    if(value === ""){
        showError("email","Email không được trống")
        return false
    }

    if(!emailRegex.test(value)){
        showError("email","Email không hợp lệ")
        return false
    }

    clearError("email")
    return true

}

function validatePhone(){

    const value = document.getElementById("phone").value.trim()

    if(value === ""){
        showError("phone","Không được để trống")
        return false
    }

    if(!phoneRegex.test(value)){
        showError("phone","SĐT phải 10 số và bắt đầu bằng 0")
        return false
    }

    clearError("phone")
    return true

}

function validatePassword(){

    const value = document.getElementById("password").value

    if(value === ""){
        showError("password","Không được để trống")
        return false
    }

    if(!passwordRegex.test(value)){
        showError("password","≥8 ký tự, có chữ hoa, thường và số")
        return false
    }

    clearError("password")
    return true

}

function validateConfirmPassword(){

    const pass = document.getElementById("password").value
    const confirm = document.getElementById("confirmPassword").value

    if(confirm === ""){
        showError("confirmPassword","Không được để trống")
        return false
    }

    if(pass !== confirm){
        showError("confirmPassword","Mật khẩu không khớp")
        return false
    }

    clearError("confirmPassword")
    return true

}

function validateGender(){

    const checked =
    document.querySelector("input[name='gender']:checked")

    if(!checked){

        document.getElementById("genderError").innerText =
        "Phải chọn giới tính"

        document.getElementById("genderError").style.display="block"

        return false
    }

    document.getElementById("genderError").style.display="none"

    return true

}

function validateTerms(){

    const checked = document.getElementById("terms").checked

    if(!checked){

        document.getElementById("termsError").innerText =
        "Bạn phải đồng ý điều khoản"

        document.getElementById("termsError").style.display="block"

        return false
    }

    document.getElementById("termsError").style.display="none"

    return true

}

document.getElementById("registerForm")
.addEventListener("submit",function(e){

    e.preventDefault()

    const valid =
    validateFullname() &
    validateEmail() &
    validatePhone() &
    validatePassword() &
    validateConfirmPassword() &
    validateGender() &
    validateTerms()

    if(valid){

        const name =
        document.getElementById("fullname").value

        document.getElementById("registerForm").style.display="none"

        document.getElementById("successBox").innerHTML =
        `<div class="success-message">
        Đăng ký thành công! 🎉<br>
        Chào mừng ${name}
        </div>`

    }

})

document.querySelectorAll("input").forEach(input=>{

    input.addEventListener("input",()=>{

        const id = input.id

        if(id){
            const err = document.getElementById(id+"Error")
            if(err) err.style.display="none"
        }

        input.classList.remove("error-border")

    })

})

document.getElementById("fullname").addEventListener("blur",validateFullname)
document.getElementById("email").addEventListener("blur",validateEmail)
document.getElementById("phone").addEventListener("blur",validatePhone)
document.getElementById("password").addEventListener("blur",validatePassword)
document.getElementById("confirmPassword").addEventListener("blur",validateConfirmPassword)

</script>

</body>
</html>
